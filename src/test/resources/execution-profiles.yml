profiles:
  - id: local-android
    target: ANDROID_NATIVE
    description: Local Android native app
    configClass: io.github.roberto22palomar.pepenium.core.configs.local.android.AndroidConfigLocal

  - id: local-android-web
    target: ANDROID_WEB
    description: Local Android mobile web
    configClass: io.github.roberto22palomar.pepenium.core.configs.local.android.AndroidWebConfigLocal

  - id: local-web
    target: WEB_DESKTOP
    description: Local Chrome desktop web
    configClass: io.github.roberto22palomar.pepenium.core.configs.local.desktop.ChromeWebConfigLocal

  - id: aws-android
    target: ANDROID_NATIVE
    description: AWS Android native app
    configClass: io.github.roberto22palomar.pepenium.core.configs.aws.android.AndroidConfigAWS

  - id: aws-android-web
    target: ANDROID_WEB
    description: AWS Android mobile web
    configClass: io.github.roberto22palomar.pepenium.core.configs.aws.android.AndroidWebConfigAWS

  - id: aws-ios
    target: IOS_NATIVE
    description: AWS iOS native app
    configClass: io.github.roberto22palomar.pepenium.core.configs.aws.ios.IOSConfigAWS

  - id: browserstack-android
    target: ANDROID_NATIVE
    description: BrowserStack Android native app
    configClass: io.github.roberto22palomar.pepenium.core.configs.browserstack.android.AndroidConfigBS

  - id: browserstack-android-web
    target: ANDROID_WEB
    description: BrowserStack Android mobile web
    configClass: io.github.roberto22palomar.pepenium.core.configs.browserstack.android.AndroidWebConfigBS

  - id: browserstack-ios
    target: IOS_NATIVE
    description: BrowserStack iOS native app
    configClass: io.github.roberto22palomar.pepenium.core.configs.browserstack.ios.IOSConfigBS

  - id: browserstack-ios-web
    target: IOS_WEB
    description: BrowserStack iOS mobile web
    configClass: io.github.roberto22palomar.pepenium.core.configs.browserstack.ios.IOSWebConfigBS

  - id: browserstack-windows-web
    target: WEB_DESKTOP
    description: BrowserStack Windows desktop web
    configClass: io.github.roberto22palomar.pepenium.core.configs.browserstack.desktop.WindowsWebConfigBS

  - id: browserstack-mac-web
    target: WEB_DESKTOP
    description: BrowserStack Mac desktop web
    configClass: io.github.roberto22palomar.pepenium.core.configs.browserstack.desktop.MacWebConfigBS
