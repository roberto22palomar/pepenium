name: CI Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  framework-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run full framework verify
        run: mvn -B -ntp verify

      - name: Generate coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: ./.github/scripts/Write-CoverageBadge.ps1 -OutputPath '.github/badges/coverage.json'

      - name: Publish coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tmpdir="$(mktemp -d)"
          cp .github/badges/coverage.json "$tmpdir/coverage.json"

          cd "$tmpdir"
          git init
          git checkout --orphan coverage-badge
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p .github/badges
          mv coverage.json .github/badges/coverage.json
          touch .nojekyll

          git add .github/badges/coverage.json .nojekyll
          git commit -m "Update coverage badge"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin coverage-badge

  consumer-smoke:
    runs-on: ubuntu-latest
    needs: framework-verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Install framework artifacts for smoke consumer
        run: mvn -B -ntp -pl pepenium-core,pepenium-toolkit -am install -DskipTests "-Djacoco.skip=true" "-Dcheckstyle.skip=true" "-Dspotbugs.skip=true" "-Djapicmp.skip=true"

      - name: Validate standalone public API consumer
        run: mvn -B -ntp -U -f consumer-smoke/pom.xml clean test-compile
