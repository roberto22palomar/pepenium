name: CI Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  java-compatibility:
    name: Java ${{ matrix.java }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            java: "11"
          - os: ubuntu-latest
            java: "17"
          - os: ubuntu-latest
            java: "21"
          - os: windows-latest
            java: "11"
          - os: macos-latest
            java: "17"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Run portable unit and contract tests
        run: mvn -B -ntp test -Djacoco.skip=true -Dcheckstyle.skip=true -Dspotbugs.skip=true -Djapicmp.skip=true

  framework-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run full framework verify
        run: mvn -B -ntp verify

      - name: Generate coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: ./.github/scripts/Write-CoverageBadge.ps1 -OutputPath '.github/badges/coverage.json'

      - name: Publish coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tmpdir="$(mktemp -d)"
          cp .github/badges/coverage.json "$tmpdir/coverage.json"

          cd "$tmpdir"
          git init
          git checkout --orphan coverage-badge
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p .github/badges
          mv coverage.json .github/badges/coverage.json
          touch .nojekyll

          git add .github/badges/coverage.json .nojekyll
          git commit -m "Update coverage badge"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin coverage-badge

  consumer-smoke:
    runs-on: ubuntu-latest
    needs: framework-verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Validate standalone public API consumer
        run: ./scripts/test-consumer-smoke.sh
