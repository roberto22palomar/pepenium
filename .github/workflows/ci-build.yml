name: CI Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  framework-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run full framework verify
        run: mvn -B -ntp verify

  consumer-smoke:
    runs-on: ubuntu-latest
    needs: framework-verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Install framework artifacts for smoke consumer
        run: mvn -B -ntp -pl pepenium-core,pepenium-toolkit -am install -DskipTests "-Djacoco.skip=true" "-Dcheckstyle.skip=true" "-Dspotbugs.skip=true"

      - name: Validate standalone public API consumer
        run: mvn -B -ntp -U -f consumer-smoke/pom.xml clean test-compile
