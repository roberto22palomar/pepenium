name: CI Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  toolkit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run toolkit tests
        run: mvn -B -ntp -pl pepenium-toolkit -am verify

  core-test:
    runs-on: ubuntu-latest
    needs: toolkit-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run full framework tests
        run: mvn -B -ntp verify

  consumer-smoke:
    runs-on: ubuntu-latest
    needs: core-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Install framework artifacts for smoke consumer
        run: mvn -B -ntp -pl pepenium-core,pepenium-toolkit -am install -DskipTests

      - name: Validate standalone public API consumer
        run: mvn -B -ntp -U -f consumer-smoke/pom.xml clean test-compile

  package:
    runs-on: ubuntu-latest
    needs: consumer-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Validate release-ready packaging
        run: mvn -B -ntp -Prelease -Dgpg.skip=true -Dcentral.skipPublishing=true -DskipTests package
