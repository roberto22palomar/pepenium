name: CI Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run framework tests
        run: mvn -B -ntp test

  consumer-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Install framework artifacts for smoke consumer
        run: mvn -B -ntp -pl pepenium-core,pepenium-toolkit -am install -DskipTests

      - name: Validate standalone public API consumer
        run: mvn -B -ntp -U -f consumer-smoke/pom.xml clean test-compile

  package:
    runs-on: ubuntu-latest
    needs: consumer-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Validate packaging
        run: mvn -B -ntp package -DskipTests
